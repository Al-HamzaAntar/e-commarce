version: '3.8'

services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommarce_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - ecommarce-network
    depends_on:
      - mysql
      - redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: ecommarce_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ecommarce-network
    depends_on:
      - app

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: ecommarce_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ecommarce_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_PASSWORD: password
      MYSQL_USER: ecommarce_user
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - ecommarce-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ecommarce_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommarce-network

  # Node.js for Asset Building
  node:
    image: node:18-alpine
    container_name: ecommarce_node
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - ecommarce-network
    command: sh -c "npm install && npm run build && tail -f /dev/null"

networks:
  ecommarce-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
